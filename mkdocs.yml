theme:
  name: material
  palette:
    # =========================
    # Light mode（白天模式）
    # =========================
    - media: "(prefers-color-scheme: light)" # 当用户的操作系统、浏览器“偏好配色方案”为“浅色模式”时（比如 Windows/Mac 设置了浅色主题，或者浏览器是浅色）
                                            # 就用这套配色（scheme: default）；
      scheme: default           # 颜色方案：default = 浅色主题
      primary: custom           # 主色（Header、导航栏、主按钮）
                                # custom 表示使用自定义 CSS 变量
      accent: custom            # 点缀色（链接、高亮、选中状态）
                                # 同样由 CSS 中的自定义变量控制
      toggle:
        icon: material/brightness-7  # 模式切换按钮图标（太阳）
        name: 白天模式               # 鼠标悬停时显示的名称

    # =========================
    # Dark mode（夜晚模式）
    # =========================
    - media: "(prefers-color-scheme: dark)" # 当偏好为暗色/夜间模式时，就自动切换到 scheme: slate（深色）。
      scheme: slate             # 颜色方案：slate = 深色主题
      primary: custom           # 主色（来自 [data-md-color-scheme="slate"]）
      accent: custom            # 点缀色（来自深色主题 CSS）
      toggle:
        icon: material/brightness-4  # 模式切换按钮图标（月亮）
        name: 夜晚模式               # 鼠标悬停时显示的名称
    
  features:
    # -------------------------------
    # 顶部导航栏 Tabs（你需要）
    # -------------------------------
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy  # 这个特性会添加复制按钮

    # -------------------------------
    # 内容区域 Tabs（你更需要）
    # -------------------------------
    - content.tabs
    - content.admonition
    - toc.integrate

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - pymdownx.tasklist
  - toc:
      permalink: true
  - attr_list

  # -------------------------------
  # 内容区域 Tabs 的核心，缺了就不会生效
  # -------------------------------
  - pymdownx.superfences
  - pymdownx.details      # ← 解析 ???+ 折叠块
  - pymdownx.tabbed:
      alternate_style: true  # 使用交替样式
      slugify: !!python/name:pymdownx.slugs.uslugify  # 标题处理

extra_css:
  - extra.css
  - markdown/assets/stylesheets/image.css

extra_javascript:
  - markdown/assets/js/image_fallback.js
  - markdown/assets/js/external-links.js 
